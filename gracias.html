<!DOCTYPE html>
<html lang="es-AR">
<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuración de Tailwind (Misma que index.html) -->

        tailwind.config = {
            theme: {
                extend: {
                    colors: {

<body class="bg-brand-light font-sans antialiased min-h-screen flex items-center justify-center p-4">

            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-8">

            <h1 class="text-4xl md:text-5xl font-heading font-bold text-brand-dark uppercase mb-4 tracking-tight">

            <div class="w-16 h-1 bg-gray-200 mx-auto mb-10"></div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="index.html" class="bg-brand-dark text-white font-heading font-bold py-4 px-10 uppercase tracking-widest hover:bg-brand-red transition-all duration-300 rounded-lg shadow-md hover:shadow-xl transform hover:-translate-y-1">
